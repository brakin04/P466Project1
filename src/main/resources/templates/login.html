<!DOCTYPE html>
<html layout:decorate="~{layout}"> 
<body>
    <div layout:fragment="content">
        <div class="card justify-self-c" style="width: 50vw;">
            <h1 class="d-flex justify-con-c">Please log in</h1>
            <hr>
            <div class="d-flex justify-con-c">
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label> Username: <input type="text" name="username"/> </label>
                </div>
                <div class="mb-3">
                    <label> Password: <input type="password" name="password"/> </label>
                </div>
                <div class="d-flex justify-con-e">
                <button class="btn" type="submit">Log In</button>
                </div>
                <div th:if="${param.error}" style="color:red">Invalid username or password.</div>
            </form>
            </div>
        </div>
    </div>
</body>
</html>
