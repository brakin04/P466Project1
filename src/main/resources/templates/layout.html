<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <title>Great Speeches</title>
    <link rel="icon" th:href="@{/images/logo.jpeg}" type="image/jpeg"/>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
    <div class="d-flex top-of-screen">
        <!-- <div class="justify-con-ar"> -->
            <nav id="navbar" width="100%">
                <div class="d-flex justify-con-bt">
                    <a class="btn3" th:href="@{/}"><h1>Great Speeches</h1></a>
                    <div class="d-flex justify-con-e">
                        <a class="btn" sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
                        <div class="d-flex justify-con-e" sec:authorize="isAuthenticated()">
                            <a class="btn mr-2" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/}">Admin Page</a>
                            <form th:action="@{/logout}" method="post">
                                <button class="btn" type="submit">Log Out</button>
                            </form>
                        </div>
                    </div>
                </div>
            </nav>
        <!-- </div> -->
    </div>

    <main layout:fragment="content" style="padding: 8px"></main>

    <footer style="padding: 8px">
        <p>Made by Bryan A</p>
    </footer>
    <script th:src="@{/main.js}"></script>
</body>
</html>
